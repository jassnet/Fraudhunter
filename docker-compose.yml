# Local PostgreSQL for development (matches default DATABASE_URL in .env.example).
# Start: docker compose up -d
# Stop:  docker compose down
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fraudchecker
    ports:
      - "5432:5432"
    volumes:
      - fraudchecker_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fraudchecker"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  fraudchecker_pg_data:
