services:
  - type: web
    name: fraudchecker-backend
    env: python
    rootDir: backend
    buildCommand: pip install .
    startCommand: python -m uvicorn fraud_checker.api:app --host 0.0.0.0 --port $PORT --app-dir ./src
    preDeployCommand: PYTHONPATH=./src python -m fraud_checker.migrations
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DATABASE_URL
        fromDatabase:
          name: fraudchecker-db
          property: connectionString
      - key: FC_CORS_ORIGINS
        value: https://fraudchecker-frontend.onrender.com
      - key: FC_ADMIN_API_KEY
        sync: false
      - key: FC_READ_API_KEY
        sync: false
      - key: FC_REQUIRE_READ_AUTH
        value: "true"
      - key: ACS_BASE_URL
        sync: false
      - key: ACS_ACCESS_KEY
        sync: false
      - key: ACS_SECRET_KEY
        sync: false
      - key: ACS_TOKEN
        sync: false
      - key: ACS_ALLOW_INSECURE
        value: "false"
      - key: FC_ENABLE_IN_PROCESS_JOB_KICK
        value: "false"
      - key: FRAUD_TIMEZONE
        value: "Asia/Tokyo"

  - type: web
    name: fraudchecker-frontend
    env: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.20.0
      - key: NEXT_PUBLIC_API_URL
        value: https://fraudchecker-backend.onrender.com
      - key: FC_ADMIN_API_KEY
        sync: false
      - key: FC_READ_API_KEY
        sync: false

  - type: cron
    name: fraudchecker-refresh-hourly
    env: python
    rootDir: backend
    schedule: "0 * * * *"
    buildCommand: pip install .
    startCommand: python -m fraud_checker.cli enqueue-refresh --hours 1 --detect
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DATABASE_URL
        fromDatabase:
          name: fraudchecker-db
          property: connectionString
      - key: ACS_BASE_URL
        sync: false
      - key: ACS_ACCESS_KEY
        sync: false
      - key: ACS_SECRET_KEY
        sync: false
      - key: ACS_TOKEN
        sync: false
      - key: ACS_ALLOW_INSECURE
        value: "false"
      - key: FRAUD_TIMEZONE
        value: "Asia/Tokyo"

  - type: cron
    name: fraudchecker-backfill-6hourly
    env: python
    rootDir: backend
    schedule: "15 */6 * * *"
    buildCommand: pip install .
    startCommand: python -m fraud_checker.cli enqueue-backfill --hours 24 --detect
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DATABASE_URL
        fromDatabase:
          name: fraudchecker-db
          property: connectionString
      - key: ACS_BASE_URL
        sync: false
      - key: ACS_ACCESS_KEY
        sync: false
      - key: ACS_SECRET_KEY
        sync: false
      - key: ACS_TOKEN
        sync: false
      - key: ACS_ALLOW_INSECURE
        value: "false"
      - key: FRAUD_TIMEZONE
        value: "Asia/Tokyo"

  - type: cron
    name: fraudchecker-sync-masters-daily
    env: python
    rootDir: backend
    schedule: "30 3 * * *"
    buildCommand: pip install .
    startCommand: python -m fraud_checker.cli enqueue-sync-masters
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DATABASE_URL
        fromDatabase:
          name: fraudchecker-db
          property: connectionString
      - key: ACS_BASE_URL
        sync: false
      - key: ACS_ACCESS_KEY
        sync: false
      - key: ACS_SECRET_KEY
        sync: false
      - key: ACS_TOKEN
        sync: false
      - key: ACS_ALLOW_INSECURE
        value: "false"
      - key: FRAUD_TIMEZONE
        value: "Asia/Tokyo"

  - type: cron
    name: fraudchecker-queue-runner-minute
    env: python
    rootDir: backend
    schedule: "* * * * *"
    buildCommand: pip install .
    startCommand: python -m fraud_checker.cli run-worker --max-jobs 5
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DATABASE_URL
        fromDatabase:
          name: fraudchecker-db
          property: connectionString
      - key: ACS_BASE_URL
        sync: false
      - key: ACS_ACCESS_KEY
        sync: false
      - key: ACS_SECRET_KEY
        sync: false
      - key: ACS_TOKEN
        sync: false
      - key: ACS_ALLOW_INSECURE
        value: "false"
      - key: FRAUD_TIMEZONE
        value: "Asia/Tokyo"

databases:
  - name: fraudchecker-db
    databaseName: fraudchecker
    user: fraudchecker
